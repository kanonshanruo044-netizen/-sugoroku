<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夢女子すごろく</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(135deg,#fff5f9,#ffe1ee,#fff);
  color:#5a3342;
  text-align:center;
}
.app{
  max-width:460px;
  margin:auto;
  padding:20px 14px 40px;
}
h1{
  color:#ff5f9a;
  margin:16px 0 6px;
}
.sub{
  color:#8d6170;
  font-size:14px;
}
.card{
  background:rgba(255,255,255,.94);
  border-radius:24px;
  padding:18px;
  margin:14px 0;
  box-shadow:0 8px 24px rgba(255,111,161,.22);
}
input,select{
  width:100%;
  padding:13px;
  margin:7px 0;
  border:2px solid #ffd0df;
  border-radius:15px;
  font-size:16px;
  background:white;
}
button{
  border:none;
  border-radius:999px;
  background:#ff6fa3;
  color:white;
  font-size:17px;
  font-weight:bold;
  padding:13px 24px;
  margin-top:10px;
  box-shadow:0 6px 14px rgba(255,111,163,.35);
}
button:active{transform:scale(.95)}
button:disabled{
  opacity:.55;
}
.hidden{display:none}
.playerBox{
  border:1px solid #ffd6e4;
  border-radius:18px;
  padding:12px;
  margin:10px 0;
  background:#fff9fb;
}
.turn{
  font-weight:bold;
  color:#ff4f93;
  font-size:18px;
}
.dice{
  font-size:52px;
  margin:10px 0;
}
.spin{
  animation:spin .45s ease;
}
@keyframes spin{
  0%{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(180deg) scale(1.25)}
  100%{transform:rotate(360deg) scale(1)}
}
.board{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin-top:14px;
}
.cell{
  min-height:52px;
  background:#fff;
  border:2px solid #ffd6e4;
  border-radius:14px;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
}
.goal{
  background:#fff0f6;
  color:#ff4f93;
  font-weight:bold;
}
.pieces{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:2px;
}
.piece{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#ff6fa3;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}
.p2{background:#8e7cff}
.p3{background:#57b8ff}
.p4{background:#ffb84d}
.p5{background:#70c989}
.event{
  font-size:17px;
  line-height:1.8;
  min-height:120px;
}
.fade{
  animation:fade .35s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.small{
  font-size:13px;
  color:#9a6b7b;
}
</style>
</head>

<body>
<div class="app">
  <h1>夢女子すごろく</h1>
  <div class="sub">最大5人で遊べる、推しとのお題すごろく</div>

  <div id="startScreen" class="card">
    <select id="boardSelect"></select>

    <select id="playerCount" onchange="makePlayerInputs()">
      <option value="1">1人で遊ぶ</option>
      <option value="2">2人で遊ぶ</option>
      <option value="3">3人で遊ぶ</option>
      <option value="4">4人で遊ぶ</option>
      <option value="5">5人で遊ぶ</option>
    </select>

    <div id="playerInputs"></div>

    <button onclick="startGame()">はじめる</button>
    <p class="small">音はサイコロを振った時だけ鳴ります。</p>
  </div>

  <div id="gameScreen" class="hidden">
    <div class="card">
      <div id="boardTitle"></div>
      <div class="turn" id="turnText"></div>
      <div class="dice" id="dice">🎲</div>
      <button id="rollBtn" onclick="rollDice()">🎲 サイコロを振る</button>
    </div>

    <div class="board" id="board"></div>

    <div class="card event" id="eventCard">
      サイコロを振ってスタート！
    </div>

    <button onclick="resetGame()">最初から遊ぶ</button>
  </div>
</div>

<script>
const GOAL = 29;

const boards = {
  yume: {
    title: "夢女子すごろく",
    events: [
      "{oshi}との初対面。どんな場所で出会った？",
      "{oshi}から最初になんと呼ばれる？",
      "{me}は{oshi}を何と呼ぶ？",
      "{oshi}に初めて褒められた。何を褒められた？",
      "{oshi}の第一印象は？",
      "{oshi}視点で、{me}の第一印象は？",
      "{oshi}と初デート。どこへ行く？",
      "{oshi}から突然プレゼント。何をもらった？",
      "{oshi}が嫉妬した理由は？",
      "{me}が嫉妬した出来事は？",
      "{oshi}と一緒に暮らすなら、家事の分担は？",
      "{oshi}が風邪をひいた。{me}はどう看病する？",
      "{me}が風邪をひいた。{oshi}はどう看病する？",
      "{oshi}と喧嘩。その原因は？",
      "喧嘩のあと、どちらから仲直りする？",
      "{oshi}の照れた姿を妄想してください。",
      "{oshi}が{me}にだけ見せる特別な一面とは？",
      "周囲から見た{me}と{oshi}はどんな関係？",
      "{oshi}との思い出の場所は？",
      "10年後、{me}と{oshi}はどんな関係？",
      "{oshi}に壁ドンされた。その後どうなる？",
      "雨の日に相合い傘。誰が傘を持つ？",
      "花火大会で偶然手が触れた。次に何が起こる？",
      "{oshi}が{me}の名前を呼んだ。どんな声だった？",
      "{me}が転びそうになったところを、{oshi}が支えてくれた。",
      "{oshi}は{me}のどんなところに惹かれた？",
      "{oshi}が寝ぼけて{me}にしたことは？",
      "{me}が泣いた時、{oshi}は何を言う？",
      "{oshi}が弱音を吐いた。{me}はどう寄り添う？",
      "{oshi}が{me}にお願いをした。内容は？",
      "{me}が{oshi}にお願いをした。叶えてくれる？",
      "{oshi}と夜道を歩く。何を話す？",
      "{oshi}と朝を迎えた。最初の一言は？",
      "{oshi}の部屋に初めて入った。印象は？",
      "{me}の部屋に来た{oshi}の反応は？",
      "{oshi}と料理をする。何を作る？",
      "{me}の料理を食べた{oshi}の感想は？",
      "{oshi}が料理に失敗した。{me}はどうする？",
      "{oshi}と買い物。何を選び合う？",
      "{oshi}が{me}に似合うと言った服は？",
      "{me}が{oshi}に選んだ服は？",
      "{oshi}とお祭りへ。どんな屋台に行く？",
      "{oshi}と花火を見る。どんな距離感？",
      "{oshi}が浴衣姿の{me}を見た反応は？",
      "{me}が浴衣姿の{oshi}を見た感想は？",
      "{oshi}と海へ行く。何が起きる？",
      "{oshi}と旅行。宿での出来事は？",
      "{oshi}と迷子になった。どう乗り切る？",
      "{oshi}が{me}を守った。何から？",
      "{me}が{oshi}を守った。どんな場面？",
      "{oshi}が本気で怒った。理由は？",
      "{oshi}が本気で笑った。きっかけは？",
      "{oshi}が照れ隠しをした。どんな言い方？",
      "{me}の一言で{oshi}が固まった。何と言った？",
      "{oshi}の一言で{me}が固まった。何と言われた？",
      "{oshi}が{me}の髪に触れた。理由は？",
      "{me}が{oshi}の服の裾を掴んだ。なぜ？",
      "{oshi}が{me}の手を離さない。どうして？",
      "{me}が{oshi}から逃げようとした。理由は？",
      "{oshi}が追いかけてきた。何と言う？",
      "{oshi}と秘密を共有した。どんな秘密？",
      "{me}と{oshi}だけの合言葉は？",
      "{oshi}が手紙を書いた。最初の一文は？",
      "{me}が{oshi}に手紙を書く。最後の一文は？",
      "{oshi}からのメッセージ。内容は？",
      "{me}が送ったメッセージに{oshi}はどう返す？",
      "{oshi}と電話。切る前の一言は？",
      "{oshi}が会いに来た。理由は？",
      "{me}が{oshi}に会いに行く。何を伝える？",
      "{oshi}が迎えに来た。どんな顔？",
      "{oshi}と帰り道。沈黙は気まずい？心地いい？",
      "{oshi}が{me}を褒めた。何を褒めた？",
      "{me}が{oshi}を褒めた。反応は？",
      "{oshi}が落ち込んでいる。{me}はどう励ます？",
      "{me}が落ち込んでいる。{oshi}はどう励ます？",
      "{oshi}が{me}をからかった。内容は？",
      "{me}が{oshi}をからかった。反応は？",
      "{oshi}が急に真面目な顔をした。何を言う？",
      "{oshi}が{me}に約束したことは？",
      "{me}が{oshi}に約束したことは？",
      "{oshi}と将来の話。どんな未来を語る？",
      "{oshi}が結婚の話をした。どんな流れ？",
      "{me}と{oshi}の記念日はいつ？",
      "{oshi}が記念日を覚えていた。何をしてくれる？",
      "{me}が記念日に用意したものは？",
      "{oshi}の意外な趣味を知った。何だった？",
      "{me}の趣味を知った{oshi}の反応は？",
      "{oshi}が甘い言葉を言った。どんな台詞？",
      "{oshi}が不器用な優しさを見せた。どんな行動？",
      "{me}が{oshi}の前で素直になった。何を言う？",
      "{oshi}が{me}の名前を呼び捨てにした。場面は？",
      "{oshi}が{me}を特別扱いした。周囲の反応は？",
      "{me}と{oshi}が周りに冷やかされた。どうする？",
      "{oshi}が{me}をかばった。何と言った？",
      "{me}が{oshi}をかばった。どうなった？",
      "{oshi}が別れ際に言った一言は？",
      "{me}が帰ろうとした時、{oshi}が引き止めた。理由は？",
      "{oshi}が{me}に近づきすぎた。どうなる？",
      "{me}と{oshi}の距離が縮まった瞬間は？",
      "{oshi}が{me}を好きだと自覚した瞬間は？",
      "{me}が{oshi}を好きだと自覚した瞬間は？",
      "{oshi}が告白するなら、どんな言葉？",
      "{me}が告白するなら、どんな言葉？",
      "{me}と{oshi}の物語のタイトルは？"
    ]
  },

  date: {
    title: "初デートすごろく",
    events: [
      "{oshi}との待ち合わせ場所は？",
      "{oshi}は何分前に来ていた？",
      "{me}を見た{oshi}の第一声は？"
    ]
  },

  jealousy: {
    title: "嫉妬すごろく",
    events: [
      "{oshi}が嫉妬した相手は誰？",
      "{me}が嫉妬してしまった理由は？",
      "{oshi}は嫉妬を隠す？隠さない？"
    ]
  }
};

let currentBoardKey = "yume";
let players = [];
let turn = 0;
let moving = false;
let usedEvents = [];
let lastEvent = "";

const startScreen = document.getElementById("startScreen");
const gameScreen = document.getElementById("gameScreen");
const board = document.getElementById("board");
const diceText = document.getElementById("dice");
const rollBtn = document.getElementById("rollBtn");
const eventCard = document.getElementById("eventCard");
const turnText = document.getElementById("turnText");
const boardTitle = document.getElementById("boardTitle");

function init(){
  const boardSelect = document.getElementById("boardSelect");

  Object.keys(boards).forEach(key=>{
    const option = document.createElement("option");
    option.value = key;
    option.textContent = boards[key].title;
    boardSelect.appendChild(option);
  });

  makePlayerInputs();
  loadGame();
}

function makePlayerInputs(){
  const count = Number(document.getElementById("playerCount").value);
  const area = document.getElementById("playerInputs");
  area.innerHTML = "";

  for(let i=0;i<count;i++){
    const div = document.createElement("div");
    div.className = "playerBox";
    div.innerHTML = `
      <b>プレイヤー${i+1}</b>
      <input id="me${i}" placeholder="あなたの名前">
      <input id="oshi${i}" placeholder="推しの名前">
    `;
    area.appendChild(div);
  }
}

function startGame(){
  const count = Number(document.getElementById("playerCount").value);
  currentBoardKey = document.getElementById("boardSelect").value;

  players = [];

  for(let i=0;i<count;i++){
    players.push({
      me:document.getElementById("me"+i).value.trim() || "あなた"+(i+1),
      oshi:document.getElementById("oshi"+i).value.trim() || "推し",
      pos:0
    });
  }

  turn = 0;
  usedEvents = [];
  lastEvent = "";

  startScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  drawBoard();
  updateTurn();
  showEvent("サイコロを振って、夢のすごろくを始めよう。");
  saveGame();
}

function drawBoard(){
  board.innerHTML = "";

  for(let i=0;i<=GOAL;i++){
    const cell = document.createElement("div");
    cell.className = "cell";
    if(i === GOAL) cell.classList.add("goal");

    const num = document.createElement("div");
    num.textContent = i === GOAL ? "GOAL" : i;
    cell.appendChild(num);

    const pieces = document.createElement("div");
    pieces.className = "pieces";

    players.forEach((p,index)=>{
      if(p.pos === i){
        const piece = document.createElement("div");
        piece.className = "piece p"+(index+1);
        piece.textContent = index+1;
        pieces.appendChild(piece);
      }
    });

    cell.appendChild(pieces);
    board.appendChild(cell);
  }
}

function updateTurn(){
  const p = players[turn];
  boardTitle.textContent = boards[currentBoardKey].title;
  turnText.textContent =
    "今は「" + p.me + "」の番 / 現在 " + p.pos + "マス目";
}

function rollDice(){
  if(moving) return;

  const player = players[turn];

  if(player.pos >= GOAL){
    nextTurn();
    return;
  }

  moving = true;
  rollBtn.disabled = true;

  const dice = Math.floor(Math.random()*6)+1;

  diceText.classList.remove("spin");
  void diceText.offsetWidth;
  diceText.classList.add("spin");
  diceText.textContent = ["⚀","⚁","⚂","⚃","⚄","⚅"][dice-1];

  playDiceSound();

  moveStep(dice);
}

function moveStep(steps){
  const player = players[turn];
  let count = 0;

  const timer = setInterval(()=>{
    if(count >= steps || player.pos >= GOAL){
      clearInterval(timer);
      afterMove();
      return;
    }

    player.pos++;
    count++;

    playTickSound();
    drawBoard();
    updateTurn();
    saveGame();
  },260);
}

function afterMove(){
  const player = players[turn];

  if(player.pos >= GOAL){
    drawBoard();
    showEvent(
      "<b>🎉 ゴール！</b><br>" +
      player.me + "と" + player.oshi + "の物語、完走です♡"
    );
    playGoalSound();
  }else{
    showEvent(getRandomEvent(player));
  }

  moving = false;
  rollBtn.disabled = false;
  saveGame();

  if(player.pos < GOAL){
    nextTurn();
  }
}

function nextTurn(){
  turn++;
  if(turn >= players.length) turn = 0;
  updateTurn();
  saveGame();
}

function getRandomEvent(player){
  const list = boards[currentBoardKey].events;

  if(usedEvents.length >= list.length){
    usedEvents = [];
  }

  let available = list.filter(e=>!usedEvents.includes(e) && e !== lastEvent);
  if(available.length === 0){
    available = list.filter(e=>e !== lastEvent);
  }

  const event = available[Math.floor(Math.random()*available.length)];
  usedEvents.push(event);
  lastEvent = event;

  return event
    .replaceAll("{me}", player.me)
    .replaceAll("{oshi}", player.oshi);
}

function showEvent(text){
  eventCard.classList.remove("fade");
  void eventCard.offsetWidth;
  eventCard.classList.add("fade");
  eventCard.innerHTML = text;
}

function resetGame(){
  localStorage.removeItem("multiYumeSugoroku");
  location.reload();
}

function saveGame(){
  localStorage.setItem("multiYumeSugoroku",JSON.stringify({
    currentBoardKey,players,turn,usedEvents,lastEvent
  }));
}

function loadGame(){
  const data = localStorage.getItem("multiYumeSugoroku");
  if(!data) return;

  const saved = JSON.parse(data);

  currentBoardKey = saved.currentBoardKey || "yume";
  players = saved.players || [];
  turn = saved.turn || 0;
  usedEvents = saved.usedEvents || [];
  lastEvent = saved.lastEvent || "";

  if(players.length === 0) return;

  startScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");

  drawBoard();
  updateTurn();
  showEvent("前回の続きから再開しました。");
}

let audioCtx;

function getAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function beep(freq,duration,type="sine",volume=.08){
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + duration);
}

function playDiceSound(){
  beep(260,.06,"square",.05);
  setTimeout(()=>beep(330,.06,"square",.05),80);
  setTimeout(()=>beep(240,.06,"square",.05),160);
}

function playTickSound(){
  beep(420,.035,"square",.035);
}

function playGoalSound(){
  beep(520,.12,"sine",.08);
  setTimeout(()=>beep(660,.12,"sine",.08),130);
  setTimeout(()=>beep(880,.2,"sine",.08),260);
}

init();
</script>
</body>
</html>
