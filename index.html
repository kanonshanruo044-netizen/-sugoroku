<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#c85583" />
  <title>夢主スゴロク</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="appShell">
    <header class="siteHeader">
      <p class="eyebrow">YUMENUSHI SUGOROKU</p>
      <h1>夢主スゴロク</h1>
      <p class="tagline">推しと進め。友達と沼れ。</p>
    </header>

    <main>
      <section id="homeScreen" class="card screen">
        <h2>はじめる</h2>
        <p class="lead">名前と推しの名前を入れて、部屋を作るか、友達の部屋に参加してください。</p>

        <label>
          あなたの名前
          <input id="playerNameInput" type="text" maxlength="12" placeholder="例：あなたの名前" autocomplete="nickname" />
        </label>

        <label>
          推しの名前
          <input id="oshiNameInput" type="text" maxlength="12" placeholder="例：推しの名前" />
        </label>

        <label>
          この部屋の定員
          <select id="capacityInput">
            <option value="1">1人で遊ぶ</option>
            <option value="2" selected>2人で遊ぶ</option>
            <option value="3">3人で遊ぶ</option>
            <option value="4">4人で遊ぶ</option>
            <option value="5">5人で遊ぶ</option>
          </select>
        </label>

        <button id="createRoomButton" type="button">部屋を作る</button>

        <div class="divider"><span>または</span></div>

        <label>
          部屋ID
          <input id="roomIdInput" type="text" maxlength="6" placeholder="例：ABC123" autocapitalize="characters" />
        </label>
        <button id="joinRoomButton" type="button" class="secondaryButton">部屋に入る</button>
        <p id="homeMessage" class="message" aria-live="polite"></p>
      </section>

      <section id="roomScreen" class="card screen hidden">
        <p class="smallLabel">部屋ID</p>
        <h2 id="roomIdText" class="roomCode">------</h2>
        <button id="copyRoomButton" type="button">部屋IDをコピー</button>

        <div class="lobbySummary">
          <span id="capacityText">定員：2人</span>
          <span id="joinedCountText">参加者：1人</span>
        </div>

        <h3>参加者</h3>
        <ul id="playerList" class="playerList"></ul>

        <button id="startGameButton" type="button">ゲーム開始</button>
        <button id="leaveRoomButton" type="button" class="secondaryButton">部屋から出る</button>
        <p id="roomMessage" class="message" aria-live="polite"></p>
      </section>

      <section id="gameScreen" class="screen hidden">
        <div class="card gameStatusCard">
          <p>部屋ID：<strong id="gameRoomIdText">------</strong></p>
          <p>コース：<strong id="courseNameText">はじまりのときめきコース</strong></p>
          <p>現在の番：<strong id="turnPlayerText">---</strong></p>
        </div>

        <div class="card">
          <h2 class="boardHeading">すごろく盤 <span>GOAL 30</span></h2>
          <div id="board" class="board" aria-label="すごろく盤"></div>
        </div>

        <div class="card centerCard">
          <div id="diceResult" class="dice" aria-live="polite">🎲</div>
          <button id="rollDiceButton" type="button">サイコロを振る</button>
          <p id="eventText" class="eventText">ゲーム開始を待っています。</p>
          <p id="gameMessage" class="message" aria-live="polite"></p>

          <div id="resultPanel" class="resultPanel hidden">
            <p id="resultText"></p>
            <button id="replayButton" type="button">もう一度あそぶ</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
